<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDL Asset Management System</title>
    <style>
        :root {
            --bg-color: #0f1117;
            --card-bg: #1a1f2e;
            --text-color: #e0e6f0;
            --accent-color: #4a9eff;
            --success-color: #00c851;
            --border-color: #1e2d42;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
        }
        h2 { margin-bottom: 20px; color: #fff; font-weight: 600; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* สไตล์ฟอร์มลงทะเบียน */
        .form-box {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }
        .form-group label { display: block; font-size: 11px; color: #8ba3c4; margin-bottom: 5px; }
        .form-group input, .form-group select {
            width: 100%; padding: 8px 12px;
            background: #0d1a2d; color: #fff;
            border: 1px solid var(--border-color); border-radius: 6px;
        }
        .btn {
            background: var(--accent-color); color: #fff; border: none;
            padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600;
        }
        .btn:hover { opacity: 0.9; }

        /* สไตล์ตารางแสดงผล */
        .table-wrap {
            background: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 12px; overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        thead { background: #0d1a2d; font-size: 11px; color: #8ba3c4; }
        th, td { padding: 12px 15px; border-bottom: 1px solid var(--border-color); }
        tbody tr:hover { background: #22293a; }
        .num-col { text-align: right; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏢 ระบบบริหารจัดการทรัพย์สิน (TDL Asset Registry)</h2>

    <div class="form-box">
        <h3 style="margin-bottom: 15px; font-size: 14px; color: var(--accent-color);">➕ เพิ่มทรัพย์สินใหม่เข้าบัญชี</h3>
        <form id="assetForm">
            <div class="form-grid">
                <div class="form-group">
                    <label>รหัสทรัพย์สิน (Asset ID)</label>
                    <input type="text" id="asset_id" required placeholder="เช่น TDL-FA-001">
                </div>
                <div class="form-group">
                    <label>ชื่อรายการทรัพย์สิน</label>
                    <input type="text" id="asset_name" required>
                </div>
                <div class="form-group">
                    <label>หมวดหมู่</label>
                    <select id="category_id">
                        <option value="1">ยานพาหนะ/เครื่องจักรหนัก</option>
                        <option value="2">อุปกรณ์ไอที</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>สถานที่ตั้ง/ผู้ถือครอง</label>
                    <input type="text" id="location" required>
                </div>
                <div class="form-group">
                    <label>วันที่ซื้อ</label>
                    <input type="date" id="purchase_date" required>
                </div>
                <div class="form-group">
                    <label>ราคาทุน (Cost)</label>
                    <input type="number" id="purchase_cost" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>อายุใช้งาน (ปี)</label>
                    <input type="number" id="useful_life" required>
                </div>
            </div>
            <button type="submit" class="btn">💾 บันทึกทรัพย์สิน</button>
        </form>
    </div>

    <h3>📋 ทะเบียนทรัพย์สินถาวรปัจจุบัน</h3>
    <div class="table-wrap" style="margin-top: 10px;">
        <table>
            <thead>
                <tr>
                    <th>รหัสทรัพย์สิน</th>
                    <th>ชื่อทรัพย์สิน</th>
                    <th>หมวดหมู่</th>
                    <th>สถานที่ตั้ง</th>
                    <th>วันที่ซื้อ</th>
                    <th class="num-col">ราคาทุน</th>
                    <th>สถานะ</th>
                </tr>
            </thead>
            <tbody id="assetTableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    const API_URL = 'https://tdl-asset-backend.onrender.com/api/assets'; 
// ตัดเครื่องหมาย / ตัวสุดท้ายออก ให้จบที่คำว่า assets พอดีเป๊ะ

    // 1. ดึงข้อมูลจาก Python API มาแสดงในตาราง
    async function loadAssets() {
        try {
            const response = await fetch(API_URL);
            const assets = await response.json();
            const tbody = document.getElementById('assetTableBody');
            tbody.innerHTML = '';

            assets.forEach(asset => {
                const row = `<tr>
                    <td style="font-family: monospace; color: #8ba3c4;">${asset.asset_id}</td>
                    <td style="font-weight: 600;">${asset.asset_name}</td>
                    <td>${asset.category_name}</td>
                    <td>📍 ${asset.location}</td>
                    <td>${new Date(asset.purchase_date).toLocaleDateString('th-TH')}</td>
                    <td class="num-col" style="color: var(--success-color); font-weight: 700;">
                        ${parseFloat(asset.purchase_cost).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}
                    </td>
                    <td><span style="background: #002040; color: var(--accent-color); padding: 3px 8px; border-radius: 4px; font-size: 11px;">${asset.status}</span></td>
                </tr>`;
                tbody.innerHTML += row;
            });
        } catch (error) {
            console.error('Error loading assets:', error);
        }
    }

    // 2. ส่งข้อมูลฟอร์มไปบันทึกผ่าน API
    document.getElementById('assetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const assetData = {
            asset_id: document.getElementById('asset_id').value,
            asset_name: document.getElementById('asset_name').value,
            category_id: parseInt(document.getElementById('category_id').value),
            location: document.getElementById('location').value,
            purchase_date: document.getElementById('purchase_date').value,
            purchase_cost: parseFloat(document.getElementById('purchase_cost').value),
            useful_life: parseInt(document.getElementById('useful_life').value),
            salvage_value: 0.0
        };

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(assetData)
            });

            if (response.ok) {
                alert('บันทึกทรัพย์สินสำเร็จ!');
                document.getElementById('assetForm').reset();
                loadAssets(); // โหลดตารางใหม่
            } else {
                const error = await response.json();
                alert('เกิดข้อผิดพลาด: ' + error.detail);
            }
        } catch (error) {
            alert('ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้');
        }
    });

    // โหลดข้อมูลครั้งแรกเมื่อเปิดหน้าเว็บ
    window.addEventListener('DOMContentLoaded', loadAssets);
</script>
</body>
</html>
