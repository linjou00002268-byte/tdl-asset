<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDL Asset Management System</title>
    <link rel="icon" href="data:,">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151d30;
            --text-color: #e2e8f0;
            --accent-color: #3b82f6;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --border-color: #24324f;
            --sidebar-bg: #0f172a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; min-height: 100vh; }
        
        /* Sidebar Navigation */
        .sidebar { width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border-color); padding: 25px 20px; display: flex; flex-direction: column; gap: 30px; }
        .logo-area { color: #fff; font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .nav-menu { display: flex; flex-direction: column; gap: 8px; list-style: none; }
        .nav-item { padding: 12px 15px; color: #94a3b8; border-radius: 8px; cursor: pointer; font-weight: 500; transition: all 0.2s; display: flex; align-items: center; gap: 12px; }
        .nav-item:hover, .nav-item.active { background: var(--card-bg); color: #fff; }
        .nav-item.active { border-left: 4px solid var(--accent-color); }

        /* Main Content Container */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; position: relative; }
        .page-header { margin-bottom: 30px; }
        .page-title { font-size: 24px; color: #fff; margin-bottom: 5px; }
        .page-subtitle { color: #64748b; font-size: 14px; }

        /* KPI Cards (Dashboard) */
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .kpi-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 14px; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .kpi-label { font-size: 13px; color: #94a3b8; }
        .kpi-value { font-size: 24px; font-weight: 700; color: #fff; }
        
        /* Windows/Tabs Management */
        .tab-window { display: none; }
        .tab-window.active { display: block; animation: fadeIn 0.3s ease; }

        /* Loading Overlay */
        .status-overlay { background: rgba(11, 15, 25, 0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; border-radius: 14px; border: 1px solid var(--border-color); text-align: center; margin-top: 20px; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--accent-color); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        .status-text { font-size: 16px; color: #fff; margin-bottom: 5px; }
        .status-sub { font-size: 13px; color: #64748b; margin-bottom: 15px; }

        /* Utility Elements */
        .search-container { margin-bottom: 20px; display: flex; gap: 10px; }
        .search-input { flex: 1; padding: 10px 15px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; color: #fff; }
        
        /* Table & Form Styles */
        .table-wrap { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        thead { background: #0f172a; color: #94a3b8; font-size: 12px; }
        th, td { padding: 14px 20px; border-bottom: 1px solid var(--border-color); }
        tbody tr:hover { background: #1e293b; }
        .num-col { text-align: right; }

        .form-box { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 30px; max-width: 800px; margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 25px; }
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
        .form-group label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 8px; }
        .form-group input, .form-group select { width: 100%; padding: 10px 14px; background: #0f172a; color: #fff; border: 1px solid var(--border-color); border-radius: 8px; }
        
        .btn { background: var(--accent-color); color: #fff; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; }
        .btn:hover { opacity: 0.9; }
        .btn-sm { padding: 8px 16px; font-size: 13px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
